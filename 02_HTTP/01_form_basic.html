<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Basic</title>
</head>
<body>
    <form action="check.html">
        <table>
            <tr>
                <td><label for="username">이름</label></td>
                <!--
                    input 태그
                    name : 서버로 전송될 때 사용되는 이름
                    id : html 요소의 고유식별자
                    type : 입력 필드의 종류
                -->
                <td><input type="text" name="name" id="username" placeholder="이름"/></td>
            </tr>
            <tr>
                <td>성별</td>
                <td>
                    <input type="radio" id="man" name="gender" value="m"/>
                    <label for="man">남자</label>
                    <input type="radio" id="woman" name="gender" value="w"/>
                    <label for="woman">여자</label>
                </td>
            </tr>
            <tr>
                <td><label for="mail">이메일</label></td>
                <td>
                    <input type="email" id="mail" name="email" placeholder="이메일"/>
                </td>
            </tr>
        </table>
        <input type="submit" value="가입"/>
    </form>
</body>
</html>
