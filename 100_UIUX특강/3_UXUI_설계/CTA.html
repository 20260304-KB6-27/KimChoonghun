<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTA 실습1</title>
    <link rel="stylesheet" href="CTA.css" />
  </head>
  <body>
    <div class="mission">
      <h2>실습 문제1</h2>
      <p>현재 버튼은 사용자가 바로 이해하고 행동하기 어려운 상태입니다.</p>
      <p>CTA를 중심으로, 화면 전체의 UX를 개선해보세요.</p>
    </div>
    <div class="container">
      <div class="card">
        <h1>주문 정보</h1>
        <p class="product">상품명: 무선 키보드</p>
        <p>가격: 49,000원</p>
        <p>배송비: 무료</p>
        <p>예상 도착일: 내일 도착</p>

        <label for="coupon">쿠폰 코드</label>
        <div class="coupon-box">
          <input type="text" id="coupon" placeholder="쿠폰 코드를 입력하세요" />
          <button class="btn">확인</button>
        </div>

        <div class="button-group">
          <button class="btn btn-purchase">결제하기</button>
        </div>
      </div>
    </div>
  </body>
</html>
