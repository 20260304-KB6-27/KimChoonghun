<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 안정성 실습</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h3><i class="fa-solid fa-user fs-6 me-1"></i> 로그인</h3>

        <input type="text" id="userId" placeholder="아이디 입력" />
        <input type="password" id="userPw" placeholder="비밀번호 입력" />

        <button id="loginBtn">로그인</button>

        <div class="message error hidden" id="errorBox"></div>
        <div class="message success hidden" id="successBox"></div>
        <a href="#" class="helper-link hidden" id="helperLink">비밀번호 찾기</a>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
