<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <ul>
        <!-- 
          v-for
          문법 : v-for = "(item, index) in 배열"

          주의
          :key 속성을 필수적으로 등록!!
          인덱스 값은 변할 수 있으므로 key로 사용하지 않는 것이 좋다.
          
        -->
        <table v-bind="{style: tableStyle}">
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
          <tr v-for="(val, index) in contacts" :key="val.name">
            <td>{{index+1}}</td>
            <td>{{val.name}}</td>
            <td>{{val.phone}}</td>
          </tr>
        </table>
        
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        name: "App",
        data() {
          return {
            contacts: [{
              no: "1011",
              name: "RM",
              phone: "010-3456-8299"
            },
            {
              no: "1012",
              name: "정국",
              phone: "010-3456-8298"
            },
            {
              no: "1013",
              name: "제이홉",
              phone: "010-3456-8297"
            },
            {
              no: "1014",
              name: "슈가",
              phone: "010-3456-8296"
            },],
          }
        }
      }).mount("#app");
    </script>
    <style>
      table {
        width: 60%;
        text-align: center;
        border-spacing: 0px;
        border: solid 1px black;
      }
      
      th, td {
        border: solid 1px black;
      }

      th {
        background-color: purple;
        color: yellow;
      }
    </style>
  </body>
</html>
