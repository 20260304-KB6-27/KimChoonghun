<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-11</title>
    <link rel="stylesheet" href="https://unpkg.com/bootstrap@5.2.3/dist/css/bootstrap.min.css" />
    <style> /* 6-11.html */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .title {
            text-align: center;
            font-weight: bold;
            font-size: 20pt;
        }
        .todo-done {
            text-decoration: line-through;
        }
        .container {
            padding: 10px 10px 10px 10px;
        }
        .panel-borderless {
            border: 0;
            box-shadow: none;
        }
        .pointer {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="card card-body bg-light">
            <div class="title">:: Todolist App</div>
        </div>
        <div class="card card-default card-corderless">
            <div class="card-body"> <!-- 6-12.html -->
                <div class="row mb-3">
                    <div class="input-group">
                        <input 
                            id="msg" 
                            type="text" 
                            class="form-control" 
                            name="msg" 
                            placeholder="할일을 여기에 입력!"
                            v-model.trim="todo"
                            @keyup.enter="addTodo"
                        /> <!-- enter 치거나 추가버튼을 눌렀을때의 이벤트를 전달하여 addTodo 메서드 실행 -->
                        <span class="btn btn-primary input-group-addon" @click="addTodo">추가</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <ul class="list-group">
                            <!-- 6-14.html -->
                            <li 
                                v-for="todoitem in todolist"
                                :key="todoitem.id"
                                class="list-group-item"
                                :class="{ 'list-group-item-success': todoitem.completed }"
                            > <!-- click 이벤트를 통해 완료/미완료 처리 메서드에 id를 파라미터로 전달하여 처리 -->
                                <input type='checkbox' @click="toggleCompleted(todoitem.id)" v-if="todoitem.completed" checked/>
                                <input type='checkbox' @click="toggleCompleted(todoitem.id)" v-if="!todoitem.completed"/>
                                <span class="pointer" :class="{ 'todo-done': todoitem.completed }">
                                    {{todoitem.todo}} {{ todoitem.completed ? "(완료)" : "" }}
                                </span>
                                <span class="float-end badge bg-secondary pointer"
                                    @click.stop="deleteTodo(todoitem.id)"
                                >삭제</span> <!-- .stop은 부모에도 click 이벤트가 있으므로 버블링을 막기 위해 필요하다 -->
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const todo = ref('')
                var ts = ref(new Date().getTime());
                const todolist = ref([
                        { id: ts, todo: "자전거 타기", completed: false},
                        { id: ts+1, todo: "딸과 공원 산책", completed: true},
                        { id: ts+2, todo: "일요일 애견 카페", completed: false},
                        { id: ts+3, todo: "Vue 원고 집필", completed: false},
                    ]);
                const addTodo = () => { // 할일 추가하는 메서드
                    if (todo.value.length >= 2) { // 할 일 입력은 2자 이상!
                        todolist.value.push({id: new Date().getTime(), todo: todo.value, completed: false}); // todolist에 추가
                        todo.value = ""; // 초기화
                        sortList()
                    }
                }
                const deleteTodo = (id) => { // 해당하는 id를 찾아 todolist에서 제거
                    let index = todolist.value.findIndex((item) => id === item.id); 
                    todolist.value.splice(index, 1); // .splice(ind, n) : ind에서부터 n개의 요소 제거
                    sortList()
                }
                const toggleCompleted = (id) => { // 해당하는 id를 찾아 완료 <-> 미완료 토글처리
                    let index = todolist.value.findIndex((item) => id === item.id);
                    todolist.value[index].completed = !todolist.value[index].completed; 
                    sortList()
                }
                const sortList = () => {
                    todolist.value.sort(
                        function (a,b) {
                            console.log(a.todo,a.completed, b.todo, b.completed)
                            if (a.completed == b.completed)
                                if (a.todo > b.todo)
                                    return 1
                                else if (a.todo < b.todo)
                                    return -1
                                else
                                    return 0
                            else
                                if (a.completed)
                                    return 1
                                else
                                    return -1
                        }
                    )
                }
                sortList()
                return {
                    todolist,
                    todo,
                    addTodo,
                    deleteTodo,
                    toggleCompleted,
                    sortList
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
