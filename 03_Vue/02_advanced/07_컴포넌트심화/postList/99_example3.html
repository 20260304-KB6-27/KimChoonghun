<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v3</h1>
      <div class="new-post">
        <input type="text" placeholder="새 게시글 제목" v-model="new_title">
        <input type="text" placeholder="새 게시글 내용" v-model="new_content">
        <button @click="addPost()">작성</button>
      </div>
      <!-- 아래의 목록을 완성하세요 -->
        <div v-for="(val, key, index) in sortedPosts">
            <div class="post-item" @click="toggle(val.no)">{{val.no}}. {{val.title}}<span class="arrow" v-show="show_no==val.no">▲</span><span class="arrow" v-show="show_no!=val.no">▼</span></div>
            <div class="post-content" v-show="show_no==val.no && edit_no != val.no">
                <h1>{{val.title}}</h1>
                <p>{{val.content}}</p>
                <button @click="editPost(val.no)">수정</button>
                <button @click="removePost(val.no)">삭제</button>
                <button @click="toggle(0)">닫기</button>
            </div>
            <div class="post-content edit-content" v-if="show_no==val.no &&  edit_no==val.no">
                <input type="text" v-model="edit_title">
                <textarea v-model="edit_content"></textarea>
                <div>
                  <button @click="savePost(val.no)">저장</button>
                  <button @click="editPost(0)">취소</button>
                </div>
            </div>
        </div>

    </div>

    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const posts = ref([
            {
              no: 1,
              title: "Vue.js 기초 배우기",
              content:
                "Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.",
            },
            {
              no: 2,
              title: "자바스크립트 ES6 문법",
              content:
                "ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.",
            },
            {
              no: 3,
              title: "Node.js와 Express",
              content:
                "Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.",
            },
            {
              no: 4,
              title: "MongoDB 기본 개념",
              content:
                "MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.",
            },
            {
              no: 5,
              title: "프론트엔드와 백엔드의 차이",
              content:
                "프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.",
            },
            {
              no: 6,
              title: "비동기 프로그래밍",
              content:
                "JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.",
            },
            {
              no: 7,
              title: "Vue Router 사용법",
              content:
                "Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.",
            },
            {
              no: 8,
              title: "컴포넌트 기반 개발",
              content:
                "Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.",
            },
            {
              no: 9,
              title: "CSS와 SCSS 차이점",
              content:
                "SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.",
            },
            {
              no: 10,
              title: "Git과 GitHub 사용법",
              content:
                "Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.",
            },
          ]);

          const sortedPosts = computed(() => {
            posts.value.sort((a,b) => {
              if (a.no > b.no) {
                return -1
              } else {
                return 1
              }
              // return a.no - b.no
            })
            return posts.value
          })
          
          const new_title = ref('');
          const new_content = ref('');
          const edit_title = ref('');
          const edit_content = ref('');
          // 아래에 화면처럼 동작하도록 구현해보세요
          let show_no = ref(0);
          let edit_no = ref(0);
          const list_no = ref(posts.value.length)
          const toggle = (no) => {
              if (show_no.value == no) {
                edit_title.value = ''
                edit_content.value = ''
                show_no.value = 0;
                return
              }
              if (no) {
                let index = posts.value.findIndex((item) => no === item.no); 
                edit_title.value = posts.value[index].title;
                edit_content.value = posts.value[index].content;
              }
              show_no.value = no;
                // console.log(no)
            };

          const sortList = () => {
            posts.value.sort((a,b) => {
              if (a.no > b.no) {
                return -1
              } else {
                return 1
              }
              // return a.no - b.no
            })
          }

          const addPost = () => {
            list_no.value += 1
            posts.value.push({
              no: list_no.value,
              title: new_title.value,
              content: new_content.value              
            });
            new_title.value = '';
            new_content.value = '';
          };

          const savePost = (no) => {
            edit_no.value = 0;
            let index = posts.value.findIndex((item) => no === item.no); 
            posts.value[index].title = edit_title.value;
            posts.value[index].content = edit_content.value;
          }

          const editPost = (no) => {
            edit_no.value = no;
          }

          const removePost = (no) => {
            if (confirm(
              "정말로 삭제하시겠습니까?"
            )) {
              let index = posts.value.findIndex((item) => no === item.no); 
            posts.value.splice(index, 1); // .splice(ind, n) : ind에서부터 n개의 요소 제거
            }
            
          }
          
          sortList()

          return {
            posts,
            show_no,
            toggle,
            sortList,
            addPost,
            new_title,
            new_content,
            sortedPosts,
            removePost,
            edit_no,
            editPost,
            edit_content,
            edit_title,
            savePost
          };
        },
      }).mount("#app");
    </script>

    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      .edit-content {
        display: grid;
        gap: 5px;
      }
      button {
        /* margin-top: 10px; */
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }

      .arrow {
        font-size: 0.8em;
        color: #888;
      }

      .new-post {
        display: flex;
        justify-content: center;
        gap: 5px;
      }

      input {
        padding: 5px;
      }
    </style>
  </body>
</html>
