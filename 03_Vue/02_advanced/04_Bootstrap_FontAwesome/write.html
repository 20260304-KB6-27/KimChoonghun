<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Fontawesome CDN-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container p-5">
        <div class="d-flex align-items-center">
            <!-- fs : font-size -->
            <i class="fa-regular fa-pen-to-square fs-2 me-1"></i>
            <h1 class="fw-bold">새 글쓰기</h1>
        </div>
        <div>
            <form>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="title">제목</label>
                    <input class="border rounded" name="title" id="title">    
                </div>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="writer">작성자</label>
                    <input class="border rounded" name="writer" id="writer">    
                </div>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="content">내용</label>
                    <div>
                    <textarea class="w-100 border rounded" id="content" name="content" style="height: 300px;"></textarea>    
                    </div>
                </div>
                <div class="d-flex gap-1">
                    <button class="btn btn-primary" type="submit"><i class="fa-solid fa-check me-1"></i>확인</button>
                    <button class="btn btn-primary" type="res"><i class="fa-solid fa-rotate-left me-1"></i>취소</button>
                    <button class="btn btn-primary"><i class="fa-solid fa-list me-1"></i>목록</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
