<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Fontawesome CDN-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script><br>
</head>
<body>
    <div id="app" class="container p-5">
        <div class="d-flex align-items-center">
            <!-- fs : font-size -->
            <i class="fa-solid fa-user-plus fs-2 me-2"></i>
            <h1 class="fw-bold">회원 가입</h1>
        </div>
        <div>
            <form>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="userId"><i class="fa-solid fa-user fs-6 me-1"></i>사용자 ID:</label>
                    <input class="border rounded" name="userId" id="userId">    
                </div>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="pw"><i class="fa-solid fa-lock fs-6 me-1"></i>비밀번호:</label>
                    <input class="border rounded" type="password" name="pw" id="pw" v-model="pw">     
                </div>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="pw-check"><i class="fa-solid fa-lock fs-6 me-1"></i>비밀번호 확인:</label>
                    <input class="border rounded" type="password" name="pw-check" id="pw-check" v-model="pwCheck">     
                </div>
                <p v-if="!checkpw">비밀번호가 다릅니다!</p>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="email"><i class="fa-regular fa-envelope fs-6 me-1"></i>email:</label>
                    <input class="border rounded" type="email" name="emai" id="email">     
                </div>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="avatar"><i class="fa-regular fa-user fs-6 me-1"></i>아바타 이미지</label>
                    <input class="border rounded" type="file" accept=".png" ex name="avatar" id="avatar">     
                </div>
                <div class="d-flex mt-3 justify-content-center">
                    <button class="btn btn-primary w-20" type="submit"><i class="fa-solid fa-user-plus me-1"></i>회원가입</button>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            const pw = ref('');
            const pwCheck = ref('');

            const checkpw = computed(() => {
                // console.log(pw.value, pwCheck.value)
                return pw.value == pwCheck.value
            })

            return {
                pw,
                pwCheck,
                checkpw
            }
        }
    }).mount("#app");
</script>
</html>
