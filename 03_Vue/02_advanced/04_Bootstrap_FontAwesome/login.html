<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Fontawesome CDN-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container p-5">
        <div class="d-flex align-items-center">
            <!-- fs : font-size -->
            <i class="fa-solid fa-arrow-right-to-bracket fs-2 me-1"></i>
            <h1 class="fw-bold">로그인</h1>
        </div>
        <div>
            <form>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="userId"><i class="fa-solid fa-user fs-6 me-1"></i>사용자 ID:</label>
                    <input class="border rounded" name="userId" id="userId">    
                </div>
                <div class="d-grid mt-2">
                    <label class="mb-1" for="pw"><i class="fa-solid fa-lock fs-6 me-1"></i>비밀번호:</label>
                    <input class="border rounded" type="password" name="pw" id="pw">     
                </div>
                <div class="d-flex mt-3">
                    <button class="btn btn-primary w-100" type="submit"><i class="fa-solid fa-arrow-right-to-bracket me-1"></i>로그인</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
