<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <input v-model.lazy="name" placeholder="이름을 입력하세요">
        <br/>
        <input v-model.lazy="user.age" placeholder="나이를 입력하세요">
        <br/>
        <input v-model.lazy="user.email" placeholder="이메일을 입력하세요">
        <br/>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
        const { createApp, ref, watch } = Vue;

        createApp({
            setup() {
                const name = ref('');
                const user = ref({
                    age: 0,
                    email: '',
                });

                // watch
                // 반응형 데이터가 변경될때 실행
                // 데이터 변경에 따른 부가적인 작업을 할때 사용 (알림, 로깅, ...)
                watch(name, (newV, oldV) => {
                    console.log(`이름이 ${oldV}에서 ${newV}로 변경됨`);
                });

                // 객체를 deep을 사용해서 감시할 경우 newV, oldV가 동일한 Proxy 객체를 참조한다.
                // watch(user, (newV, oldV) => {
                //     console.log(`기존 사용자 ${oldV.age}, ${oldV.email} -> 변경된 사용자 : ${newV.age} ${newV.email}`);
                // },
                // {
                //     deep: true, //객체 내부 속성까지 감시
                // })
                watch(() => ({...user.value}), (newV, oldV) => {
                    console.log(`기존 사용자 ${oldV.age}, ${oldV.email} -> 변경된 사용자 : ${newV.age}, ${newV.email}`);
                },
                {deep: true})
            
                return {
                    user,
                    name,
                }
            }
        }).mount("#app");
    </script>
</body>
</html>
