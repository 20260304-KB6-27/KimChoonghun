<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app"> <!-- js 표현식 -->
      <button
        :style="{backgroundColor, color}" 
        @mouseover.stop="overEvent"
        @mouseout.stop="outEvent"
        >테스트</button> <!-- hover 처리 mouseover + mouseout -->
    </div>
    <script>
      const { createApp, ref } = Vue;
      // 반응형 데이터
      createApp({
        name: "App",
        data() {
          return {
            backgroundColor: "aqua",
            color: "black"
          };
        },
        methods: {
            overEvent() {
                this.backgroundColor = "purple";
                this.color = "yellow";
            },
            outEvent() {
                this.backgroundColor = "aqua";
                this.color = "black";
            }
        }
      }).mount("#app");
    </script>
  </body>
</html>
