<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app"> <!-- js 표현식 -->
      <button
        :style="style1" 
        @mouseover.stop="overEvent"
        @mouseout.stop="outEvent"
        >테스트</button> <!-- hover 처리 mouseover + mouseout -->
    </div>
    <script>
      const { createApp, ref } = Vue;
      // 반응형 데이터
      createApp({
        name: "App",
        data() {
          return {
            style1: { // 객체로 정의 ***
                backgroundColor: "aqua",
                color: "black"
            }
          };
        },
        methods: {
            overEvent() {
                this.style1.backgroundColor = "purple";
                this.style1.color = "yellow";
            },
            outEvent() {
                this.style1.backgroundColor = "aqua";
                this.style1.color = "black";
            }
        }
      }).mount("#app");
    </script>
  </body>
</html>
