<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <style>
    body {
        background-color: azure;
    }

    .gameBtn {
        width: 100px;
        height: 100px;
        padding: 50px;
        border: black solid 2px;
        border-radius: 50%;
        align-content: center;
        box-shadow: 0px 5px 0px grey;
    }

    .gameBtn:hover {
        opacity: 0.8;
        cursor: pointer;
        scale: 0.9;
        transition: opacity 0.1s ease, scale 0.1s ease;
    }

    .start {
        background: linear-gradient(45deg, skyblue, white)
        /* background-color: skyblue; */
    }

    .wait {
        background: linear-gradient(45deg, orange, white)
        /* background-color: ; */
    }
    
    .active {
        background: linear-gradient(45deg, greenyellow, white)
    }

    .gameBg {
        display: flex;
        height: 500px;
        width: 100%;
        justify-content: center;
        text-align: center;
        align-items: center;
    }

    .main {
        display: grid;
        margin: auto;
        gap: 20px;
    }

    .recordBoard {
        padding: 20px;
        width: 20%;
        border: 1px solid black;
        border-radius: 5px;
        background: linear-gradient(0deg, rgb(215, 215, 215), white);
        box-shadow: 0px 5px 0px grey;
    }

    .recordBoard ol {
        border: 1px solid black;
        background-color: white;
        border-radius: 5px;
    }

    @font-face {
        font-family: 'A2z';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-1Thin.woff2') format('woff2');
        font-weight: 100;
        font-display: swap;
    }

    .main > span {
        font-family: 'A2z';
        font-weight: 900;
    }
  </style>
  <body>
    <div id="app">
        <div class="gameBg">
            <div class="main">
                <span :class="levelStyle" :onclick="toggleLevel">
                    <p>
                        {{ checkLevel() }}
                    </p>
                </span>
                <p v-if="alert">아직 누를 때가 아닙니다!</p>
                <span>
                    {{ result }} s / {{ result * 1000 }} ms
                </span>
            </div>
            <div class="recordBoard">
                <span>역대 기록</span>
                <ol>
                    <li v-for="(val, index) in records">
                        {{val}}
                    </li>
                </ol>
            </div>
        </div>
    </div>
    <script>
      const { createApp, ref } = Vue;
      createApp({
        setup() {
            const st = ref(0)
            const statusLabel = ref(['시작!', '대기...', '지금!']);
            const styles = ref(['start', 'wait', 'active'])
            const startTime = ref(new Date());
            const endTime = ref(new Date());
            const result = ref(0);
            const alert = ref(false);
            const records = ref([]);
            const levelStyle = ref({
                gameBtn: true,
                start: true,
                wait: false,
                active: false,
            })

            const checkLevel = () => {
                return statusLabel.value[st.value]
            }

            const toggleLevel = () => {
                endTime.value = new Date();
                if (st.value == 1 && endTime.value < startTime.value) {
                    alert.value = true;
                    return
                }
                if (st.value == 2)
                    endGame()
                levelStyle.value[styles.value[st.value]] = false;
                st.value = (st.value + 1) % 3;
                if (st.value == 1)
                    startGame()
                levelStyle.value.gameBtn = true;
                levelStyle.value[styles.value[st.value]] = true;
            }

            const startGame = () => {
                startTime.value = new Date();
                const rand = Math.floor(Math.random()*8)+4;
                // console.log(rand)
                // console.log(startTime.value)
                startTime.value.setSeconds(startTime.value.getSeconds()+rand);
                // console.log(startTime.value)
                let check = true
                setInterval((handler) => {
                    const nowTime = new Date();
                    if (nowTime >= startTime.value) {
                        if (check) {
                            toggleLevel();
                            check = false;
                        }
                    }
                }, 100)
            }

            const endGame = () => {
                endTime.value = new Date();
                result.value = (endTime.value - startTime.value) / 1000;
                alert.value = false;
                records.value.push(result.value);
                // console.log(result.value)   
            }

            return {
                status,
                statusLabel,
                checkLevel,
                gameBtn: true,
                toggleLevel,
                levelStyle,
                result,
                alert,
                records
            }
        }
      }).mount("#app");
    </script>
  </body>
</html>
