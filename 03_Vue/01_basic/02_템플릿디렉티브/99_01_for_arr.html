<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <ul>
        <!-- 
          v-for
          문법 : v-for = "(item, index) in 배열"

          주의
          :key 속성을 필수적으로 등록!!
          인덱스 값은 변할 수 있으므로 key로 사용하지 않는 것이 좋다.
          
        -->
        <li v-bind="{style: liStyle}" v-for="(fruit, index) in fruits">
          {{index+1}} : {{fruit}}
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const fruits = ref(['사과', '배', '포도']);
          const liStyle = ref(
            {
              listStyle: 'none'
            }
          )
          return {
            liStyle,
            fruits
          }
        }
      }).mount("#app");
    </script>
  </body>
</html>
