<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel ="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <script src ="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!--
        Grid
        - 한 행을 12개의 컬럼으로 구분
        - 컬럼 그룹핑 가능
        
        Grid class
        행 정의 클래스
        - .row
        컬럼 정의 클래스
        - .col-* : 576px 미만
        - .col-sm-* 576px 이상
        - .col-md-* 768px 이상
        - .col-lg-* 992px 이상
        - .col-xl-* 1200px 이상
        - .col-xxl-* 1400px 이상
    -->

    <!-- 균등 분할 -->
    <div class="row">
        <div class="col">.col</div>
        <div class="col">.col</div>
        <div class="col">.col</div>
    </div>

    <!-- 
        비균등 분할 
        - 브라우저의 폭에 따라 컬럼 그룹핑 변경
        - sm 까지는 컬럼 3개를 그룹핑
        - sm 미만이면 1줄에 1개 컬럼
    -->
    <div class="row">
        <div class="col-sm-3">.col-sm-3</div>
        <div class="col-sm-3">.col-sm-3</div>
        <div class="col-sm-3">.col-sm-3</div>
        <div class="col-sm-3">.col-sm-3</div>
    </div>
    <div class="row">
        <div class="col-sm-4">.col-sm-4</div>
        <div class="col-sm-8">.col-sm-8</div>
    </div>
    <hr/>

    <!-- 
        col 개수가 4개, md일때 4*4 = 16 sm일때 
        4*6 = 24이다 row 하나당 최대 12이므로
        md일때는 4*3 + 4로 col 하나가 밑으로 넘어가고
        sm일때는 6*2 + 6*2이므로 col 2개가 밑으로 넘어간다
    -->
    <div class="row">
        <div class="col-md-4 col-sm-6">.col</div>
        <div class="col-md-4 col-sm-6">.col</div>
        <div class="col-md-4 col-sm-6">.col</div>
        <div class="col-md-4 col-sm-6">.col</div>
    </div>
</body>
</html>
