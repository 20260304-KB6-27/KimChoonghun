<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        (Content Delivery Network)
        CDN : 사용자랑 가까운 서버에서 콘텐츠를 제공하여 웹사이트 로딩을 빠르게 도와주는 네트워크
    -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> <!-- Vue 라이브러리 -->
</head>
<body>
    <div id="app"> 
        <h2>{{message}}</h2> <!-- Template -->
        <table>
            <tr>
                <th>번호</th>
                <th>거주지</th>
            </tr>
            <tr>
                <td>{{name}}</td>
                <td>{{town}}</td>
            </tr>
        </table>
    </div>
    <script>
        let model = {message: "Hello Vue3!", name:"김충훈", town:'서울 서대문'};
        // vue 어플리케이션 생성
        let vm = Vue.createApp({ // 객체 (옵션 객체), ViewModel
            name:"App",
            data() {
                return model;
            }
        });

        // 생성한 Vue 어플리케이션을 #app 요소에 마운트(연결)
        vm.mount("#app"); // id='app'에 mount
    </script>
</body>
</html>
