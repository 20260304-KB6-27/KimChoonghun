<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <input v-model.lazy="name" placeholder="이름을 입력하세요">
        <br/>
        <input v-model.lazy="user.age" placeholder="나이를 입력하세요">
        <br/>
        <input v-model.lazy="user.email" placeholder="이메일을 입력하세요">
        <br/>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
        const { createApp, ref, watchEffect } = Vue;

        createApp({
            setup() {
                const name = ref('');
                const user = ref({
                    age: 0,
                    email: '',
                });

                watchEffect(() => {
                    // 콜백함수에서 사용된 반응형 데이터를 자동으로 추적
                    // 변경될 경우 콜백함수 실행
                    // 이전값은 확인 불가
                    console.log(`이름이 ${name.value}로  변경됨.`);
                })
            
                return {
                    user,
                    name,
                }
            }
        }).mount("#app");
    </script>
</body>
</html>
