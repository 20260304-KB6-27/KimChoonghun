<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul { overflow: hidden; }
        li {
            list-style: none;
            float: left;
            padding: 15px;
            width: 100px;
            text-align: center;
        }
        li:hover {
            border: solid;
            border-width: 2px;
            cursor: pointer;
        }
        li:first-child { border-radius: 10px 0 0 10px; }
        li:last-child { border-radius: 0 10px 10px 0; }
        li:nth-child(2n) { 
            animation: li-style2 2s infinite;
        }
        li:nth-child(2n+1) { 
            color:white;
            animation: li-style 2s infinite;
        }
        @keyframes li-style {
            0% { background-color:rgb(53, 179, 214); }
            50% { background-color: aquamarine; color: grey; }
            100% { background-color:rgb(53, 179, 214); }
        }
        @keyframes li-style2 {
            0% { background-color:rgb(214, 104, 53); }
            50% { background-color: rgb(255, 214, 127); color: grey; }
            100% { background-color:rgb(214, 104, 53); }
        }
    </style>
</head>
<body>
    <ul>
        <li>첫 번째</li>
        <li>두 번째</li>
        <li>세 번째</li>
        <li>네 번째</li>
        <li>다섯 번째</li>
        <li>여섯 번째</li>
        <li>일곱 번째</li>
    </ul>
</body>
</html>
