<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--defer: 렌더링이 끝난 다음에 호출하겠다는 의미-->
    <!-- <script src="app.js" defer></script>  -->
    <script>
        // window.onload
        // 웹페이지의 모든 콘텐츠 (html, css, Image)가 로드된 이후에 실행되는 이벤트 핸들러
        window.onload = function () {
            // 요소 찾기
            const clock = document.getElementById("clock");
            
            // this
            // 객체에서 this -> 그 객체
            // 이벤트 핸들러 -> 이벤트가 발생한 요소
            // 일반 함수 -> window
            
            setInterval(() => {
                let now = new Date().toString();
                clock.textContent = now;    
            }, 1000);
            
        };
    </script>
</head>
<body>
    <h1 id="clock"></h1>
</body>
</html>
