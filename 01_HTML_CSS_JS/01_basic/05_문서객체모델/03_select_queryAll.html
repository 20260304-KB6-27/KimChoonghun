<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--defer: 렌더링이 끝난 다음에 호출하겠다는 의미-->
    <!-- <script src="app.js" defer></script>  -->
    <script>
        // window.onload
        // 웹페이지의 모든 콘텐츠 (html, css, Image)가 로드된 이후에 실행되는 이벤트 핸들러
        window.onload = function () {
            //querySelector
            //주어진 CSS 선택자에 일치하는 첫번째 요소를 선택한다.
            const header = document.querySelectorAll('h1'); // 요소 선택
            for (h of header) {
                h.style.backgroundColor = 'red';
                h.style.color = 'orange';
            }
            
        };
    </script>
</head>
<body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
</body>
</html>
