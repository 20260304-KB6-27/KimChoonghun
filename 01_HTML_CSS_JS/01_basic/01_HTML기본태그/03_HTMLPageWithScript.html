<!-- ! -> Emmet 기능 : 코드를 빨리 쓸 수 있게 도와준다. -->
<!-- 
<script> 태그의 위치에 따른 차이
1. head에 작성 시 -> HTML 파싱 도중 스크립트를 먼저 실행, 주로 전역 설정, 유틸리티 함수에 사용
2. body에 작성 시 -> HTML이 모두 파싱된 후 스크립트 실행 -> DOM 요소에 안전하게 접근 가능
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITLE</title>
</head>
<body>
    <h1>Hello World..!</h1>
</body>
<script>
    alert("Hello JavaScript .. !");
</script>
</html>
