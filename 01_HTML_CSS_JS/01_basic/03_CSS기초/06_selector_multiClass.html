<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
        - 태그명.클래스명
        - 태그명과 클래스명이 일치하는 요소에 스타일을 적용
        */
        .item {color:red;}
        .header {background-color: blue;}
    </style>
</head>
<body>
    <!-- <body>와 <h1>과의 관계 : 부모 자식 -->
    <h1 class="item header">동해물과 백두산이</h1>
</body>
</html>
