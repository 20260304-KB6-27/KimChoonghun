<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let x = new Date();
        x = x.getHours();
        let sea = ''
        if (x < 5) {
            sea = "잠을 자렴"
        } else if (5 <= x && x < 7) {
            sea = "준비"
        } else if (7 <= x && x < 9) {
            sea = "출근"
        } else if (9 <= x && x < 12) {
            sea = "빈둥 빈둥"
        } else if (12 <= x && x < 14) {
            sea = "식사"
        } else {
            sea = "여러 가지 업무를 수행합니다."
        }
        alert(sea);
    </script>
</head>

</body>
</html>
