<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <div id="background">
        <form>
            <fieldset>
                <legend>회원가입</legend>
                <table>
                    <tr>
                        <th><label for="userid">유저 ID</label></th>
                        <td><input id="userid" name="userid"></td>
                    </tr>
                    <tr>
                        <th><label for="pw">비밀번호</label></th>
                        <td><input id="pw" type="password" name="password"></td>
                    </tr>
                    <tr>
                        <th><label for="pwcheck">비밀번호 확인</label></th>
                        <td><input type="password" id="pwcheck" name="password"></td>
                    </tr>
                    <tr>
                        <td colspan="2" id="check_message"></td>
                    </tr>
                    <tr>
                        <th><label for="name">이름</label></th>
                        <td><input id="name" name="name"></td>
                    </tr>
                    <tr>
                        <th><label for="gender">성별</label></th>
                        <td>
                            <input type="radio" id="man" name="gender" value="m">
                            <label for="man">남</label>
                            <input type="radio" id="woman" name="gender" value="w">
                            <label for="woman">여</label>
                        </td>
                    </tr>
                    <tr>
                        <th><label for="hobby">취미</label></th>
                        <td>
                            <input type="checkbox" id="soccer" name="hobby" value="soc">
                            <label for="soccer">축구</label>
                            <input type="checkbox" id="baseball" name="hobby" value="base">
                            <label for="base">야구</label>
                            <input type="checkbox" id="volleyball" name="hobby" value="vall">
                            <label for="volleyball">배구</label>
                            <input type="checkbox" id="basketball" name="hobby" value="bask">
                            <label for="basketball">농구</label>
                        </td>
                    </tr>
                    <tr>
                        <th><label for="mail">이메일</label></th>
                        <td><input id="mail" name="email" type="email"></td>
                    </tr>
                    <tr>
                        <th><label for="role">역할</label></th>
                        <td>
                            <select name="role">
                                <option value="admin">ADMIN</option>
                                <option value="manage">관리자</option>
                                <option value="common">일반회원</option>
                            </select>
                        </td>
                    </tr>
                </table>
                <div id="button-container">
                    <button type="submit">확인</button>
                    <button type="reset">다시쓰기</button>
                </div>
            </fieldset>
        </form>    
    </div>
</body>
<style>
    input,select {
        margin-left: 10px;
        padding: 4px;
        border-radius: 4px;
    }
    legend {
        text-align: center;
        width: 60%;
        margin-bottom: 5px;
        font-size: 1.2em;
        font-weight: 700;
        background-color: rgb(206, 206, 206);
        border-radius: 4px;
        padding-inline: 10px;
        border: solid;
    }
    fieldset {
        border: solid;
        border-radius: 5px;
        background: linear-gradient(to bottom, white, grey);
    }
    div#button-container {
        margin-top: 10px;
        display: flex;
        justify-content: space-evenly;
    }
    button {
        border-radius: 10px;
        width: 200px;
        height: 30px;
        color:white;
        background: linear-gradient(to right, rgb(237, 124, 124), rgb(224, 224, 116));
    }
    button:hover{
        font-size: 16px;
        background: linear-gradient(to right, rgb(128, 237, 124), rgb(116, 141, 224));
        cursor: pointer;
        font-weight: 600;
    }
    div#background {
        border-radius: 10px;
    }
    body {
        background-color: rgb(233, 233, 233);
    }
    td#check_message {
        text-align: center;
        font-size: 12px;
        color: rgb(227, 61, 61);
    }
</style>
<script>
    const check_message = document.querySelector("td#check_message");
    const pw = document.querySelector("#pw");
    const pwcheck = document.querySelector('#pwcheck');
    pw.addEventListener('change', function(e) {
        if (pw.value != pwcheck.value) {
            check_message.innerText = "비밀번호가 맞지 않습니다!";
        } else {
            check_message.innerText = "";
        }
    })
    pwcheck.addEventListener('change', function(e) {
        if (pw.value != pwcheck.value) {
            check_message.innerText = "비밀번호가 맞지 않습니다!";
        } else {
            check_message.innerText = "";
        }
    })
</script>
</html>
